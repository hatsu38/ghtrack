name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
  - title: '🐛 Bug Fixes'
    labels:
      - 'fix'
      - 'bugfix'
      - 'bug'
  - title: '🔧 Refactoring'
    labels:
      - 'refactor'
  - title: '📖 Documentation'
    labels:
      - 'docs'
      - 'documentation'
  - title: '⛓️ Dependencies'
    labels:
      - 'dependencies'
  - title: '🧰 Maintenance'
    labels:
      - 'chore'

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - 'major'
      - 'breaking'
  minor:
    labels:
      - 'minor'
      - 'feature'
      - 'enhancement'
  patch:
    labels:
      - 'patch'
      - 'fix'
      - 'bug'
      - 'chore'
      - 'dependencies'
      - 'docs'
      - 'refactor'
  default: patch

template: |
  ## Changes

  $CHANGES

autolabeler:
  - label: feature
    branch:
      - '/^feat(ure)?[/-].+/'
    title:
      - '/^feat(\(.+\))?!?:/'
  - label: fix
    branch:
      - '/^fix[/-].+/'
    title:
      - '/^fix(\(.+\))?!?:/'
  - label: refactor
    branch:
      - '/^refactor(ing)?[/-].+/'
    title:
      - '/^refactor(\(.+\))?!?:/'
  - label: docs
    branch:
      - '/^docs[/-].+/'
    title:
      - '/^docs(\(.+\))?!?:/'
    files:
      - '*.md'
      - 'docs/**'
  - label: chore
    branch:
      - '/^chore[/-].+/'
    title:
      - '/^chore(\([^)]*\))?!?:/'
  - label: dependencies
    title:
      - '/^chore\(deps(-dev)?\)/'
      - '/^chore\(actions\)/'
      - '/^build\(deps(-dev)?\)/'
