name: test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  actions: read

env:
  # pnpm/action-setup が Node.js 20 ベースで動いているため、Node 24 を強制する
  # (2026-06-02 以降は default が Node 24 になる予定だが、それまでの暫定対応)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - uses: pnpm/action-setup@v4

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - name: Verify dist/ is up to date
        run: |
          pnpm build
          if [ -n "$(git status --porcelain dist/)" ]; then
            echo '::error::dist/ is out of date. Run `pnpm build` and commit the result.'
            git status --porcelain dist/
            exit 1
          fi

  track:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run ghtrack against this run
        uses: ./
