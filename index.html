<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ghtrack — workflow duration trends</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #ffffff;
      --fg: #1f2328;
      --muted: #57606a;
      --border: #d0d7de;
      --accent: #1f6feb;
      --card: #f6f8fa;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --fg: #e6edf3;
        --muted: #8b949e;
        --border: #30363d;
        --accent: #58a6ff;
        --card: #161b22;
      }
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 24px;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Noto Sans JP", sans-serif;
      line-height: 1.5;
    }

    main { max-width: 960px; margin: 0 auto; }

    header {
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
      margin-bottom: 24px;
    }

    h1 { margin: 0 0 4px; font-size: 28px; font-weight: 600; }
    h1 a { color: inherit; text-decoration: none; }

    .subtitle { color: var(--muted); font-size: 14px; margin: 0; }

    section { margin-bottom: 36px; }
    h2 { margin: 0 0 12px; font-size: 18px; font-weight: 600; }

    .chart-wrap {
      position: relative;
      height: 360px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }

    .meta {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .empty {
      padding: 36px 12px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    footer {
      margin-top: 48px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
    }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
<main>
  <header>
    <h1><a href="https://github.com/hatsu38/ghtrack">ghtrack</a></h1>
    <p class="subtitle">Workflow run duration trends, captured by ghtrack.</p>
  </header>

  <section>
    <h2>Total duration per run</h2>
    <div class="chart-wrap"><canvas id="totalChart"></canvas></div>
    <p class="meta" id="totalMeta"></p>
  </section>

  <section>
    <h2>Per-job duration</h2>
    <div class="chart-wrap"><canvas id="jobChart"></canvas></div>
    <p class="meta" id="jobMeta"></p>
  </section>

  <footer>
    Powered by <a href="https://github.com/hatsu38/ghtrack">ghtrack</a> ·
    Charts by <a href="https://www.chartjs.org/">Chart.js</a>
  </footer>
</main>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script>
(function () {
  "use strict";

  function replaceWithEmpty(canvasId, message) {
    const el = document.getElementById(canvasId);
    if (!el) return;
    const div = document.createElement("div");
    div.className = "empty";
    div.textContent = message;
    el.parentNode.replaceChild(div, el);
  }

  function chartOptions(tooltipExtra) {
    return {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: "nearest", axis: "x", intersect: false },
      scales: {
        x: {
          type: "time",
          time: { tooltipFormat: "yyyy-MM-dd HH:mm" },
          title: { display: true, text: "Date" },
        },
        y: {
          beginAtZero: true,
          title: { display: true, text: "Seconds" },
        },
      },
      plugins: {
        legend: { display: true, position: "top" },
        tooltip: {
          callbacks: {
            afterBody(items) {
              if (!items || items.length === 0 || !tooltipExtra) return "";
              const lines = tooltipExtra(items[0].raw);
              return lines.filter(Boolean).join("\n");
            },
          },
        },
      },
    };
  }

  function buildTotalChart(entries) {
    const points = entries
      .filter((e) => typeof e.total_duration_sec === "number")
      .map((e) => ({ x: e.date, y: e.total_duration_sec, raw: e }));
    if (points.length === 0) {
      replaceWithEmpty("totalChart", "No total_duration_sec recorded yet.");
      return;
    }
    const ctx = document.getElementById("totalChart");
    new Chart(ctx, {
      type: "line",
      data: {
        datasets: [{
          label: "Total duration (sec)",
          data: points,
          borderColor: "rgb(31, 111, 235)",
          backgroundColor: "rgba(31, 111, 235, 0.15)",
          tension: 0.25,
          fill: true,
          pointRadius: 3,
        }],
      },
      options: chartOptions((point) => {
        const e = point.raw;
        if (!e) return [];
        return [
          `commit ${String(e.commit).slice(0, 7)}`,
          `workflow: ${e.workflow}`,
          `event: ${e.event}`,
          e.run_attempt && e.run_attempt > 1 ? `run_attempt: ${e.run_attempt}` : null,
        ];
      }),
    });
    document.getElementById("totalMeta").textContent =
      `${points.length} runs (latest: ${new Date(points[points.length - 1].x).toLocaleString()})`;
  }

  function buildJobChart(entries) {
    const jobNames = Array.from(
      new Set(entries.flatMap((e) => e.jobs.map((j) => j.name))),
    );
    if (jobNames.length === 0) {
      replaceWithEmpty("jobChart", "No jobs recorded yet.");
      return;
    }
    const palette = [
      "#1f6feb", "#bf8700", "#bc4c00", "#3fb950",
      "#a371f7", "#db61a2", "#0a3069", "#bc8cff",
    ];
    const datasets = jobNames.map((name, i) => {
      const data = entries
        .map((e) => {
          const job = e.jobs.find((j) => j.name === name);
          if (!job || typeof job.duration_sec !== "number") return null;
          return { x: e.date, y: job.duration_sec, raw: e, jobRaw: job };
        })
        .filter((p) => p !== null);
      const color = palette[i % palette.length];
      return {
        label: name,
        data,
        borderColor: color,
        backgroundColor: color + "22",
        tension: 0.25,
        spanGaps: true,
        pointRadius: 3,
      };
    });
    new Chart(document.getElementById("jobChart"), {
      type: "line",
      data: { datasets },
      options: chartOptions((point) => {
        if (!point || !point.raw) return [];
        return [
          `job: ${point.jobRaw.name}`,
          `commit ${String(point.raw.commit).slice(0, 7)}`,
          `conclusion: ${point.jobRaw.conclusion ?? "-"}`,
        ];
      }),
    });
    document.getElementById("jobMeta").textContent =
      `${jobNames.length} job(s) tracked across ${entries.length} run(s).`;
  }

  fetch("./data/data.json", { cache: "no-cache" })
    .then((res) => {
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    })
    .then((file) => {
      const entries = file && Array.isArray(file.entries) ? file.entries : [];
      if (entries.length === 0) {
        replaceWithEmpty("totalChart", "No entries yet. Run the workflow at least once.");
        replaceWithEmpty("jobChart", "");
        return;
      }
      entries.sort((a, b) => a.date - b.date);
      buildTotalChart(entries);
      buildJobChart(entries);
    })
    .catch((err) => {
      replaceWithEmpty("totalChart", `Failed to load data/data.json: ${err.message}`);
      replaceWithEmpty("jobChart", "");
    });
})();
</script>
</body>
</html>
